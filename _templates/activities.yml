execute:
  freeze: auto
  cache: true
  echo: true
  keep-md: false
  message: true
  warning: true
  fig-height: 4
  fig-width: 5
  paged-print: false
format:
  html:
    css: ../../css/main.css
    code-overflow: scroll
    toc: false
    max-width: 80ch
    fig-width: 3.5
    fig-height: 3.5
  docx:
    default: true
    fig-format: "jpeg"
    toc: false
    toc-depth: 3
    fig-width: 3      # Smaller figures for better document layout
    fig-height: 3     # Better proportions for printing
    fig-dpi: 72        # High resolution for crisp printing
    number-sections: false
    highlight-style: github
    reference-doc: ../../ms_templates/custom-reference.docx
    embed-resources: true
editor: visual