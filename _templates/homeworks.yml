execute:
  freeze: auto
  cache: true
  echo: true
  keep-md: true
  message: true
  warning: true
  fig-height: 5
  fig-width: 5
  paged-print: false
format:
  html:
    code-overflow: scroll
    toc: false
    max-width: 80ch
    css: ../css/main.css
    fig-width: 5
    fig-height: 5
  docx:
    docx:
    default: true
    toc: false
    toc-depth: 3
    number-sections: false
    highlight-style: github
    reference-doc: ../ms_templates/custom-reference.docx
    embed-resources: true
    fig-width: 3.55      # Smaller figures for better document layout
    fig-height: 3.5     # Better proportions for printing
    fig-dpi: 72        # High resolution for crisp printing
editor: visual