# Location: /assignments/_metadata.yml

format:
  html:
    # uses the shared /css/main.css from _quarto.yml (same theme as the data science site)
    format-links: [docx]   # <--- THIS ADDS THE "DOWNLOAD WORD" BUTTON!
    max-width: 80ch
    toc: false
    fig-width: 5
    fig-height: 5
  docx:
    toc: false
    toc-depth: 3
    number-sections: false
    highlight-style: github
    reference-doc: ../ms_templates/custom-reference.docx
    fig-width: 3.5      
    fig-height: 3.5     
    fig-dpi: 72