# Location: /lectures/_metadata.yml

execute:
  message: false 
  warning: false

format:
  html:
 #   css: ../css/activity.css
    format-links: [docx, pptx]   # <--- THIS ADDS THE "DOWNLOAD WORD" BUTTON!
    max-width: 80ch
    toc: false
    fig-width: 5
    fig-height: 5
  revealjs:
    output-ext: "slides.html"   # slides render as *.slides.html so they never
                                # collide with the page's own index.html/*.html
    css: ../css/main.css
    theme: [default, ../css/theme.scss]
    slide-number: true
    transition: fade
    background-transition: none
    scrollable: true
    smaller: true
    width: 1280
    height: 720
    margin: 0.1
    min-scale: 0.2
    max-scale: 2.0
    fig-width: 6
    fig-height: 6
  pptx:
    reference-doc: ../ms_templates/lecture_template.pptx
    embed-resources: true
    fig-width: 6.5
    fig-height: 4
    fig-dpi: 300

resources:
  - "*.R"